apiVersion: apps/v1
kind: Deployment
metadata:
  name: microdom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microdom
  template:
    metadata:
      labels:
        app: microdom
    spec:
      containers:
        - name: microdom
          image: wpirri/microdom:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: etc
              mountPath: /app/etc
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: logs
          hostPath:
            path: /var/log/microdom
            type: DirectoryOrCreate
        - name: etc
          hostPath:
            path: /etc
            type: Directory
